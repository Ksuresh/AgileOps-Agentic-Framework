prompts:
  - id: pm001
    title: Release failed with latency and policy violations
    category: cross_domain_release_governance
    pm_goal: decide_release_readiness
    priority: high
    prompt: "The latest release failed, users are seeing high latency, and security flagged a policy violation. What should we do?"
    expected_domains: [DevOps, SRE, DevSecOps]
    expected_action: "Patch or block release"
    expected_business_focus: "release risk"
    notes: "Strong cross-domain governance scenario."

  - id: pm002
    title: Cloud spend increased after autoscaling changes
    category: cost_governance
    pm_goal: assess_cost_tradeoff
    priority: medium
    prompt: "Our cloud costs increased significantly after autoscaling changes. Can you analyze and recommend what we should do?"
    expected_domains: [FinOps]
    expected_action: "Scale adjustment"
    expected_business_focus: "cost optimization"
    notes: "FinOps-focused daily PM concern."

